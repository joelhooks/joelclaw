# Agent Runner — Cold k8s Job Template
#
# This file documents the runtime image contract for sandboxed story execution.
# Actual Jobs are generated dynamically via @joelclaw/agent-execution/job-spec.
#
# Runtime Image Contract:
#
# All agent runner images MUST provide:
# - Git (for checkout, diff generation, commit)
# - Bun runtime
# - Required agent tooling (currently claude and/or other installed CLIs)
# - Workspace directory at /workspace
# - Runtime entrypoint at /app/packages/agent-execution/src/job-runner.ts
# - Ability to read configuration from environment variables
# - Exit codes: 0 = success, non-zero = failure
#
# Environment Variables (injected by Job spec):
#
# Request Metadata:
#   WORKFLOW_ID               - Restate workflow identifier
#   REQUEST_ID                - Unique request identifier (for idempotency)
#   STORY_ID                  - Story identifier from the PRD
#   SANDBOX_PROFILE           - Sandbox isolation level (workspace-write | danger-full-access)
#   BASE_SHA                  - Git SHA to start from
#   EXECUTION_BACKEND         - Expected backend value (k8s)
#   JOB_NAME                  - Deterministic Job name
#   JOB_NAMESPACE             - k8s namespace
#
# Repo Materialization:
#   REPO_URL                  - Remote git URL for isolated materialization
#   REPO_BRANCH               - Branch/ref to fetch before checkout
#   HOST_REQUESTED_CWD        - Original host cwd for operator context only
#
# Agent Identity:
#   AGENT_NAME                - Logical agent name (e.g. story-executor)
#   AGENT_VARIANT             - Optional agent variant/instance identifier
#   AGENT_MODEL               - Model identifier
#   AGENT_PROGRAM             - Program/CLI to execute (e.g. claude, codex)
#
# Execution Config:
#   SESSION_ID                - Session identifier for tracking (optional)
#   TIMEOUT_SECONDS           - Timeout for execution (optional)
#   TASK_PROMPT_B64           - Story prompt/task (base64-encoded)
#   VERIFICATION_COMMANDS_B64 - Verification commands JSON array (base64-encoded, optional)
#
# Callback Path:
#   RESULT_CALLBACK_URL       - Host-worker callback URL for SandboxExecutionResult
#   RESULT_CALLBACK_TOKEN     - Internal auth token for callback
#
# Expected Behavior:
#
# 1. Decode TASK_PROMPT_B64 from base64 to get the story task
# 2. Materialize the repo from REPO_URL / REPO_BRANCH at BASE_SHA into /workspace/repo
# 3. Execute the requested AGENT_PROGRAM with the decoded task prompt
# 4. Run verification commands if VERIFICATION_COMMANDS_B64 is set
# 5. Generate ExecutionArtifacts:
#    - Final git SHA (headSha)
#    - List of touched files
#    - Patch bundle / diff
#    - Verification status + output
# 6. Print SandboxExecutionResult between log markers:
#    - ---RESULT_START---
#    - {json}
#    - ---RESULT_END---
# 7. POST the same SandboxExecutionResult to RESULT_CALLBACK_URL
# 8. Exit 0 for success, non-zero for failure
#
# Current truthful limitation:
# - `pi` remains local-backend only for now.
# - The k8s runner is for runner-installed CLIs until host-routed pi-in-pod execution is designed.
#
# Cancellation:
# - Jobs can be cancelled by deleting the Job resource
# - The container MUST handle SIGTERM gracefully
# - Emit a cancelled SandboxExecutionResult when possible before exit
#
# Resource Defaults (can be overridden in JobSpecOptions):
#   CPU Request:    500m
#   CPU Limit:      2
#   Memory Request: 1Gi
#   Memory Limit:   4Gi
#
# TTL and Cleanup:
#   - Jobs auto-delete after ttlSecondsAfterFinished (default: 300s)
#   - Active deadline enforces max runtime (default: 1 hour)
#   - No automatic retries (backoffLimit: 0)
#
# Security:
#   - Non-root execution (UID 1000, GID 1000)
#   - No privilege escalation
#   - Minimal capabilities (drop ALL)
#   - RuntimeDefault seccomp profile
#   - Read-only root filesystem: false (agent needs workspace writes)
#
# Example Job Generation (TypeScript):
#
# ```typescript
# import { generateJobSpec } from "@joelclaw/agent-execution";
#
# const request: SandboxExecutionRequest = {
#   workflowId: "wf-abc",
#   requestId: "req-xyz",
#   storyId: "story-1",
#   task: "Implement feature X with tests",
#   agent: { name: "story-executor", program: "claude", model: "claude-3-7-sonnet" },
#   sandbox: "workspace-write",
#   backend: "k8s",
#   baseSha: "abc123",
#   repoUrl: "git@github.com:joelhooks/joelclaw.git",
#   branch: "main",
# };
#
# const options: JobSpecOptions = {
#   runtime: {
#     image: "ghcr.io/joelhooks/agent-runner:latest",
#     imagePullPolicy: "Always",
#     command: ["bun", "run", "/app/packages/agent-execution/src/job-runner.ts"],
#   },
#   namespace: "joelclaw",
#   imagePullSecret: "ghcr-pull",
#   resultCallbackUrl: "http://host.docker.internal:3111/internal/agent-result",
#   resultCallbackToken: process.env.OTEL_EMIT_TOKEN,
# };
#
# const jobManifest = generateJobSpec(request, options);
# // Apply with kubectl or k8s client library
# ```
