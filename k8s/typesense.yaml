---
# Typesense v30.1 — Unified search for JoelClaw network (ADR-0082)
# Single-node deployment with local-path PVC.
# Primary data stays local; no NAS mount at runtime (ADR-0187).
# Access via stable host NodePort 8108 so host worker/CLI observability writes do not depend on ad hoc port-forwards.
# Later: Tailscale operator can still expose a cleaner remote surface (ADR-0083).
apiVersion: v1
kind: Secret
metadata:
  name: typesense-secret
  namespace: joelclaw
type: Opaque
stringData:
  api-key: "391a65d92ff0b1d63af0e0d6cca04fdff292b765d833a65a25fb928b8a0fb065"
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: typesense
  namespace: joelclaw
  labels:
    app: typesense
spec:
  serviceName: typesense
  replicas: 1
  selector:
    matchLabels:
      app: typesense
  template:
    metadata:
      labels:
        app: typesense
    spec:
      terminationGracePeriodSeconds: 60
      tolerations:
        - key: node-role.kubernetes.io/control-plane
          operator: Exists
          effect: NoSchedule
      containers:
        - name: typesense
          image: typesense/typesense:30.1
          # Raise file-descriptor ulimit before starting Typesense. The default
          # 1024 soft limit is exhausted by HNSW segment files during large
          # vector collection reindexes (e.g. docs_chunks_v2 ~223k docs), which
          # leaves the pod in a permanent "Too many open files" state that
          # looks identical to raft ERROR from the outside. 2026-04-19 incident.
          command:
            - /bin/sh
            - -c
            - |
              set -eu
              ulimit -n 1048576 2>/dev/null || ulimit -n 65535 || true
              exec /opt/typesense-server \
                --data-dir=/data \
                --api-address=0.0.0.0 \
                --api-port=8108 \
                --enable-search-analytics=true \
                --analytics-dir=/data/analytics
          env:
            - name: TYPESENSE_API_KEY
              valueFrom:
                secretKeyRef:
                  name: typesense-secret
                  key: api-key
          ports:
            - containerPort: 8108
              name: http
          resources:
            requests:
              cpu: 200m
              memory: 2Gi
            limits:
              cpu: "2"
              memory: 8Gi
          readinessProbe:
            httpGet:
              path: /health
              port: http
              httpHeaders:
                - name: X-TYPESENSE-API-KEY
                  value: "unused" # /health doesn't need auth
            initialDelaySeconds: 5
            periodSeconds: 10
          volumeMounts:
            - name: data
              mountPath: /data
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: local-path
        resources:
          requests:
            storage: 20Gi
---
apiVersion: v1
kind: Service
metadata:
  name: typesense
  namespace: joelclaw
  labels:
    app: typesense
spec:
  type: NodePort
  selector:
    app: typesense
  ports:
    - port: 8108
      targetPort: 8108
      nodePort: 8108
      name: http
