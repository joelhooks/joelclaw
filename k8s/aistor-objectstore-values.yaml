# AIStor object store for joelclaw.
# Uses free-license-compatible single-node config and keeps credentials
# in an existing Kubernetes secret generated by reconcile-aistor.sh.

secrets:
  existingSecret: true

objectStore:
  name: aistor-s3

  configuration:
    name: aistor-env-configuration

  pools:
    - name: pool-0
      servers: 1
      volumesPerServer: 1
      size: 20Gi
      storageClassName: local-path

  services:
    minio:
      name: aistor-s3-api
      serviceType: NodePort
      nodePort: 31000
    console:
      name: aistor-s3-console
      serviceType: NodePort
      nodePort: 31001

  pvcProtection: true
