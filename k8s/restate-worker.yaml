apiVersion: apps/v1
kind: Deployment
metadata:
  name: restate-worker
  namespace: joelclaw
  labels:
    app: restate-worker
spec:
  replicas: 1
  selector:
    matchLabels:
      app: restate-worker
  template:
    metadata:
      labels:
        app: restate-worker
    spec:
      tolerations:
        - key: node-role.kubernetes.io/control-plane
          operator: Exists
          effect: NoSchedule
      imagePullSecrets:
        - name: ghcr-pull
      containers:
        - name: restate-worker
          image: ghcr.io/joelhooks/restate-worker:latest
          imagePullPolicy: Always
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop:
                - ALL
            seccompProfile:
              type: RuntimeDefault
          envFrom:
            - secretRef:
                name: system-bus-env
          env:
            - name: RESTATE_PORT
              value: "9080"
            - name: RESTATE_INGRESS_URL
              value: "http://restate:8080"
            - name: INNGEST_URL
              value: "http://inngest-svc:8288"
            - name: REDIS_URL
              value: "redis://redis:6379"
            - name: REDIS_HOST
              value: "redis"
            - name: REDIS_PORT
              value: "6379"
            - name: CHANNEL
              value: "noop"
            - name: QUEUE_DRAINER_ENABLED
              value: "true"
            - name: OTEL_EMIT_URL
              value: "http://system-bus-worker:3111/observability/emit"
            - name: TYPESENSE_URL
              value: "http://typesense:8108"
            - name: TYPESENSE_API_KEY
              valueFrom:
                secretKeyRef:
                  name: typesense-secret
                  key: api-key
          ports:
            - containerPort: 9080
              name: http
          startupProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 30
          readinessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 10
            periodSeconds: 20
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 1Gi
---
apiVersion: v1
kind: Service
metadata:
  name: restate-worker
  namespace: joelclaw
  labels:
    app: restate-worker
spec:
  type: ClusterIP
  selector:
    app: restate-worker
  ports:
    - name: http
      port: 9080
      targetPort: http
