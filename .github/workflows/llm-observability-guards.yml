name: LLM Observability Guards

on:
  pull_request:
    paths:
      - "packages/system-bus/**"
      - "scripts/validate-llm-observability-guards.ts"
      - "package.json"
      - "pnpm-lock.yaml"
      - ".github/workflows/llm-observability-guards.yml"
  push:
    branches:
      - main
    paths:
      - "packages/system-bus/**"
      - "scripts/validate-llm-observability-guards.ts"
      - "package.json"
      - "pnpm-lock.yaml"
      - ".github/workflows/llm-observability-guards.yml"
  workflow_dispatch:

jobs:
  llm-observability-guards:
    name: step.ai.infer trace guard
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate step.ai.infer tracing guard
        run: bun scripts/validate-llm-observability-guards.ts
