# Talon dynamic service monitors.
#
# Add HTTP probes under [http.<name>] and launchd probes under [launchd.<name>].
# Talon hot-reloads this file on mtime change (or immediately on SIGHUP).

[launchd.gateway]
label = "com.joel.gateway"
critical = true
timeout_secs = 5

[launchd.voice_agent]
label = "com.joel.voice-agent"
critical = false
timeout_secs = 5

# Note: do not probe voice_agent over http://127.0.0.1:8081/ by default.
# Its root endpoint returns 503 when idle, which is not a cluster outage.
